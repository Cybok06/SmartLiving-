<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .badge-status { text-transform: capitalize; }
    .table-fixed { table-layout: fixed; }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .position-relative { position: relative; }
    .suggest-box {
      position: absolute; top:100%; left:0; right:0; z-index: 20; max-height: 200px; overflow-y:auto;
    }
  </style>
</head>
<body class="bg-light">
  {% include 'manager_sidebar.html' %}

<div class="container py-4">

  <!-- Success / error status -->
  <div id="statusWrap" class="mb-3" style="display:none">
    <div id="statusAlert" class="alert" role="alert"></div>
  </div>

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h4 mb-0">My Orders</h1>
    <div class="d-flex gap-2">
      <button id="toggleCreate" class="btn btn-primary">+ New Order</button>
      <button id="refresh" class="btn btn-outline-secondary">Refresh</button>
    </div>
  </div>

  <!-- Inline create panel -->
  <div id="createPanel" class="card shadow-sm mb-3" style="display:none">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <h2 class="h6 mb-0">Create New Order</h2>
        <button class="btn btn-sm btn-outline-secondary" id="closeCreate">Close</button>
      </div>

      <div class="mt-3">
        <label class="form-label">Header Notes (optional)</label>
        <textarea id="co_notes" class="form-control" rows="2" placeholder="Any extra notes to Inventory…"></textarea>
      </div>

      <div class="table-responsive mt-3">
        <table class="table table-bordered bg-white align-middle">
          <thead>
            <tr>
              <th style="width:38%">Item</th>
              <th style="width:12%">Qty</th>
              <th style="width:22%">Expected Date</th>
              <th>Line Notes</th>
              <th style="width:6%"></th>
            </tr>
          </thead>
          <tbody id="co_rows"></tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between">
        <button class="btn btn-outline-secondary" id="co_add">+ Add item</button>
        <button class="btn btn-primary" id="co_save">Submit Order</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row gy-2 align-items-end">
        <div class="col-12 col-md-2">
          <label class="form-label mb-1">Status</label>
          <select id="status" class="form-select">
            <option value="">All</option>
            <option value="open">Open</option>
            <option value="partially_delivered">Partially delivered</option>
            <option value="closed">Closed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label mb-1">Date from</label>
          <input id="dateFrom" type="date" class="form-control">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label mb-1">Date to</label>
          <input id="dateTo" type="date" class="form-control">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label mb-1">Sort</label>
          <select id="sort" class="form-select">
            <option value="desc">Newest → Oldest</option>
            <option value="asc">Oldest → Newest</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <button id="apply" class="btn btn-primary w-100">Apply</button>
        </div>
        <div class="col-12 col-md-2 d-flex align-items-center">
          <span class="text-muted small ms-md-3">Tip: click an order to view items.</span>
        </div>
      </div>
    </div>
  </div>

  <!-- List -->
  <div id="list" class="vstack gap-3"></div>

</div>

<!-- Modal: order details -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Order Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="orderMeta" class="mb-3"></div>
        <div class="table-responsive">
          <table class="table table-sm align-middle table-fixed">
            <thead>
              <tr>
                <th style="width:32%">Item</th>
                <th style="width:10%">Qty</th>
                <th style="width:14%">Delivered</th>
                <th style="width:16%">Status</th>
                <th style="width:18%">Expected</th>
                <th style="width:10%">Line</th>
              </tr>
            </thead>
            <tbody id="orderLines"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-bs-dismiss="modal">Done</button>
      </div>
    </div>
  </div>
</div>

<script>
let ORDERS = [];

// ---------- Inline Create ----------
const coRows = document.getElementById('co_rows');
document.getElementById('toggleCreate').onclick = ()=> toggleCreate(true);
document.getElementById('closeCreate').onclick = ()=> toggleCreate(false);
document.getElementById('co_add').onclick = ()=> addCoRow();
document.getElementById('co_save').onclick = submitOrder;

function toggleCreate(show){
  document.getElementById('createPanel').style.display = show ? '' : 'none';
  if (show && coRows.children.length === 0) addCoRow();
}

function addCoRow(v={name:'',qty:1,expected_date:'',notes:''}){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="position-relative">
      <input class="form-control co-name" placeholder="Start typing… (Fan, Fridge, etc.)" value="${v.name}">
      <div class="list-group suggest-box d-none"></div>
    </td>
    <td><input type="number" min="1" class="form-control co-qty" value="${v.qty}"></td>
    <td><input type="date" class="form-control co-exp" value="${v.expected_date}"></td>
    <td><input class="form-control co-notes" value="${v.notes}"></td>
    <td><button class="btn btn-sm btn-link text-danger co-remove" title="Remove">&times;</button></td>
  `;
  coRows.appendChild(tr);

  tr.querySelector('.co-remove').onclick = ()=> tr.remove();

  // autocomplete
  const input = tr.querySelector('.co-name');
  const list = tr.querySelector('.suggest-box');
  let to;
  input.addEventListener('input', ()=>{
    const q = input.value.trim();
    clearTimeout(to);
    if (!q){ list.classList.add('d-none'); list.innerHTML=''; return; }
    to = setTimeout(async ()=>{
      try{
        const r = await fetch(`/manager/orders/catalog?q=${encodeURIComponent(q)}`);
        const j = await r.json();
        list.innerHTML = '';
        (j.results || []).forEach(name=>{
          const a = document.createElement('a');
          a.href="#"; a.className="list-group-item list-group-item-action";
          a.textContent = name;
          a.onclick = (ev)=>{ ev.preventDefault(); input.value = name; list.classList.add('d-none'); };
          list.appendChild(a);
        });
        list.classList.toggle('d-none', list.children.length === 0);
      }catch(_){}
    }, 200);
  });
  input.addEventListener('blur', ()=> setTimeout(()=> list.classList.add('d-none'), 150));
}

async function submitOrder(){
  const items = [...coRows.querySelectorAll('tr')].map(tr=>({
    name: (tr.querySelector('.co-name').value||'').trim(),
    qty:  parseInt(tr.querySelector('.co-qty').value||'0',10),
    expected_date: tr.querySelector('.co-exp').value || null,
    notes: (tr.querySelector('.co-notes').value||'').trim()
  })).filter(x=> x.name && x.qty>0);

  if (!items.length){
    showStatus('Please add at least one valid item.', 'danger');
    return;
  }

  const payload = { notes: (document.getElementById('co_notes').value||'').trim(), items };
  try{
    const r = await fetch('/manager/orders/create', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.message||'Failed to create order');

    // success: clear form, keep panel open for quick re-entry
    coRows.innerHTML = '';
    addCoRow();
    document.getElementById('co_notes').value = '';
    showStatus('Order submitted successfully and sent to Inventory.', 'success');
    // refresh list with current filters
    await load();
  }catch(err){
    showStatus(err.message || 'Failed to submit order.', 'danger');
  }
}

function showStatus(msg, type='success'){
  const wrap = document.getElementById('statusWrap');
  const al = document.getElementById('statusAlert');
  al.className = `alert alert-${type}`;
  al.textContent = msg;
  wrap.style.display = '';
  setTimeout(()=>{ wrap.style.display='none'; }, 4000);
}

// ---------- Listing + filters ----------
function badge(status) {
  const map = {
    open: 'bg-secondary',
    partially_delivered: 'bg-warning',
    closed: 'bg-success',
    cancelled: 'bg-dark'
  };
  const cls = map[status] || 'bg-secondary';
  return `<span class="badge ${cls} badge-status">${status || 'open'}</span>`;
}

function lineBadge(status) {
  const map = { pending:'bg-secondary', postponed:'bg-warning', delivered:'bg-success' };
  const cls = map[status] || 'bg-secondary';
  return `<span class="badge ${cls}">${status||'pending'}</span>`;
}

function queryParams(){
  const p = new URLSearchParams();
  const status = document.getElementById('status').value;
  const df = document.getElementById('dateFrom').value;
  const dt = document.getElementById('dateTo').value;
  const so = document.getElementById('sort').value;
  if (status) p.set('status', status);
  if (df) p.set('date_from', df);
  if (dt) p.set('date_to', dt);
  p.set('sort', so || 'desc');
  return p.toString();
}

async function load() {
  const r = await fetch(`/manager/orders/list?` + queryParams());
  const j = await r.json();
  if (!j.ok) { showStatus(j.message || 'Failed to load orders', 'danger'); return; }
  ORDERS = j.results || [];
  renderList();
}

function renderList() {
  const root = document.getElementById('list');
  root.innerHTML = '';
  if (!ORDERS.length) {
    root.innerHTML = `<div class="text-center text-muted py-5">No orders yet. Click <strong>+ New Order</strong> to create one.</div>`;
    return;
  }
  ORDERS.forEach(o=>{
    const items = o.items || [];
    const delivered = items.filter(i=>i.status==='delivered').length;
    const total = items.length;
    const el = document.createElement('div');
    el.className = 'card shadow-sm';
    el.innerHTML = `
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-2">
            <div class="fw-semibold">Order</div>
            <code>${o._id}</code>
            ${badge(o.status)}
          </div>
          <div class="text-muted small">Updated: ${o.updated_at ? new Date(o.updated_at).toLocaleString() : ''}</div>
        </div>
        <div class="mt-2 small text-muted truncate">${o.notes || ''}</div>
        <div class="mt-3 row g-3">
          <div class="col-6 col-md-3">
            <div class="border rounded p-2 bg-light">
              <div class="text-muted small">Lines</div>
              <div class="fs-5">${total}</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="border rounded p-2 bg-light">
              <div class="text-muted small">Delivered lines</div>
              <div class="fs-5">${delivered}</div>
            </div>
          </div>
          <div class="col-12 col-md-6 text-end">
            <button class="btn btn-sm btn-outline-primary view">View details</button>
          </div>
        </div>
      </div>
    `;
    el.querySelector('.view').onclick = ()=> openModal(o);
    root.appendChild(el);
  });
}

function openModal(order) {
  const meta = document.getElementById('orderMeta');
  const lines = document.getElementById('orderLines');
  meta.innerHTML = `
    <div class="row g-2">
      <div class="col-md-4"><strong>Order ID:</strong> <code>${order._id}</code></div>
      <div class="col-md-4"><strong>Status:</strong> ${badge(order.status)}</div>
      <div class="col-md-4"><strong>Created:</strong> ${order.created_at ? new Date(order.created_at).toLocaleString() : ''}</div>
      <div class="col-12"><strong>Notes:</strong> ${order.notes || '-'}</div>
    </div>
  `;
  lines.innerHTML = (order.items||[]).map(it=>`
    <tr>
      <td class="truncate" title="${it.name||''}">${it.name||''}</td>
      <td>${it.qty||0}</td>
      <td>${it.delivered_qty||0}</td>
      <td>${lineBadge(it.status)}</td>
      <td>${it.expected_date||''}</td>
      <td><code class="small">${it.line_id||''}</code></td>
    </tr>
  `).join('');

  const modal = new bootstrap.Modal(document.getElementById('orderModal'));
  modal.show();
}

document.getElementById('refresh').onclick = load;
document.getElementById('apply').onclick = load;
document.getElementById('status').onchange = load;

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>load();</script>
</body>
</html>
